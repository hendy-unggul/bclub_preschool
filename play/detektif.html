<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFE600">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiQiBDbHViIC0gRGV0ZWt0aWYgUG9sYSIsInNob3J0X25hbWUiOiJCIENsdWIiLCJzdGFydF91cmwiOiIuL2RldGVrdGlmLmh0bWwiLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjRjVGNUYwIiwidGhlbWVfY29sb3IiOiIjRkZFNjAwIiwib3JpZW50YXRpb24iOiJwb3J0cmFpdCJ9">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        :root {
            --black: #0D0D0D; --yellow: #FFE600; --coral: #FF4D4D; 
            --white: #FFFFFF; --gray: #F5F5F0; --green: #00E676;
            --orange: #FF9800; --blue: #2196F3; --purple: #9C27B0;
        }

        body {
            background: var(--gray); color: var(--black);
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; touch-action: manipulation;
        }

        header {
            background: var(--black); padding: 8px 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--yellow);
        }
        .btn-back {
            background: var(--white); border: 3px solid var(--black);
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; box-shadow: 3px 3px 0 var(--black);
            cursor: pointer; text-decoration: none;
        }
        .btn-back:active { transform: translate(3px, 3px); box-shadow: none; }
        .level-badge {
            background: var(--yellow); border: 3px solid var(--black);
            padding: 6px 16px; border-radius: 20px;
            font-weight: 900; font-size: 16px; box-shadow: 3px 3px 0 var(--black);
        }

        .score-board {
            display: flex; gap: 20px; justify-content: center;
            padding: 10px; background: var(--white);
            border-bottom: 3px solid var(--black);
        }
        .score-item {
            display: flex; align-items: center; gap: 6px;
            font-size: 24px; font-weight: 900;
        }
        .score-item .icon { font-size: 28px; }
        .score-item.stars { color: #FF9800; }
        .score-item.hearts { color: var(--coral); }
        .score-item.points { color: var(--green); }

        .mascot-area {
            display: flex; justify-content: center; align-items: center;
            padding: 12px; gap: 12px;
        }
        .mascot {
            font-size: 64px;
            animation: mascotBounce 2s infinite;
            filter: drop-shadow(3px 3px 0 var(--black));
        }
        @keyframes mascotBounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        .mascot-bubble {
            background: var(--white); border: 4px solid var(--black);
            padding: 12px 20px; border-radius: 20px;
            box-shadow: 4px 4px 0 var(--black);
            position: relative; font-size: 24px;
            max-width: 200px; text-align: center;
        }

        .progress-area {
            display: flex; justify-content: center; gap: 8px;
            padding: 6px;
        }
        .progress-dot {
            width: 16px; height: 16px; border-radius: 50%;
            border: 3px solid var(--black); background: var(--white);
            transition: all 0.3s;
        }
        .progress-dot.done { background: var(--green); transform: scale(1.2); }
        .progress-dot.current {
            background: var(--yellow);
            animation: pulseDot 1s infinite;
            transform: scale(1.3);
        }
        @keyframes pulseDot {
            0%, 100% { box-shadow: 0 0 0 0 var(--yellow); }
            50% { box-shadow: 0 0 0 8px rgba(255, 230, 0, 0); }
        }

        .wrong-area {
            display: flex; justify-content: center; gap: 8px;
            min-height: 40px; align-items: center;
        }
        .wrong-dot {
            width: 20px; height: 20px; border-radius: 50%;
            background: var(--white); border: 3px solid var(--coral);
            transition: all 0.3s;
        }
        .wrong-dot.filled {
            background: var(--coral);
            animation: wrongPulse 0.5s;
        }
        @keyframes wrongPulse {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .pattern-row {
            display: flex; gap: 12px; margin: 12px 0;
            background: var(--white); padding: 16px; border-radius: 20px;
            border: 4px solid var(--black); box-shadow: 6px 6px 0 var(--black);
            flex-wrap: wrap; justify-content: center;
        }
        .pattern-item {
            width: 60px; height: 60px;
            display: flex; justify-content: center; align-items: center;
            font-size: 40px; background: var(--white);
            border-radius: 16px; border: 3px solid var(--black);
            box-shadow: 2px 2px 0 var(--black);
            transition: all 0.3s ease;
        }
        .pattern-item.missing {
            background: var(--yellow);
            border: 4px dashed var(--black);
            animation: pulseMissing 1.5s infinite;
            box-shadow: none;
        }
        .pattern-item.missing::before {
            content: '❓';
            font-size: 32px;
            animation: questionWiggle 1s infinite;
        }
        @keyframes pulseMissing {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes questionWiggle {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }
        .pattern-item.correct-fill {
            background: var(--green) !important;
            border: 3px solid var(--black) !important;
            animation: correctPop 0.5s;
            box-shadow: 2px 2px 0 var(--black);
        }
        @keyframes correctPop {
            0% { transform: scale(0.5); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .choices-container {
            display: flex; flex-direction: column;
            align-items: center; gap: 12px;
        }
        .choices-cue {
            font-size: 36px;
            animation: cueBounce 1s infinite;
            margin-bottom: 4px;
        }
        @keyframes cueBounce {
            0%, 100% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(-8px); opacity: 0.7; }
        }
        .choices-row {
            display: flex; gap: 16px; justify-content: center;
        }
        .choice-btn {
            width: 80px; height: 80px;
            display: flex; justify-content: center; align-items: center;
            font-size: 48px; background: var(--white);
            border: 4px solid var(--black); border-radius: 20px;
            box-shadow: 5px 5px 0 var(--black);
            cursor: pointer; transition: all 0.15s;
        }
        .choice-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 1px 1px 0 var(--black);
        }
        .choice-btn.correct {
            background: var(--green);
            animation: bigPop 0.4s;
            box-shadow: 5px 5px 0 #004d00;
        }
        .choice-btn.wrong {
            background: var(--coral);
            animation: bigShake 0.5s;
            box-shadow: 5px 5px 0 #800000;
        }
        @keyframes bigPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }
        @keyframes bigShake {
            0%, 100% { transform: translateX(0) rotate(0); }
            20% { transform: translateX(-12px) rotate(-5deg); }
            40% { transform: translateX(12px) rotate(5deg); }
            60% { transform: translateX(-8px) rotate(-3deg); }
            80% { transform: translateX(8px) rotate(3deg); }
        }

        /* ═══════════════════════════════════════════════════════
           CREATE PATTERN MODE - Drag & Drop
        ═══════════════════════════════════════════════════════ */
        .create-area {
            display: flex; flex-direction: column;
            align-items: center; gap: 16px;
            padding: 20px;
        }
        .create-instruction {
            font-size: 24px; font-weight: 900;
            text-align: center;
        }
        .pattern-builder {
            display: flex; gap: 12px; flex-wrap: wrap;
            justify-content: center;
            min-height: 80px; padding: 16px;
            background: var(--white); border-radius: 20px;
            border: 4px dashed var(--black);
            width: 100%; max-width: 400px;
        }
        .pattern-builder .pattern-item {
            cursor: grab;
        }
        .pattern-builder .pattern-item:active {
            cursor: grabbing;
        }
        .pattern-palette {
            display: flex; gap: 12px; flex-wrap: wrap;
            justify-content: center;
        }
        .palette-item {
            width: 60px; height: 60px;
            display: flex; justify-content: center; align-items: center;
            font-size: 40px; background: var(--yellow);
            border-radius: 16px; border: 3px solid var(--black);
            cursor: pointer; transition: all 0.15s;
            box-shadow: 3px 3px 0 var(--black);
        }
        .palette-item:active {
            transform: translate(3px, 3px);
            box-shadow: none;
        }
        .palette-item.selected {
            background: var(--green);
            transform: scale(1.1);
        }

        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(13,13,13,0.92);
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; padding: 20px;
        }
        .overlay.show { display: flex; }
        .feedback-emoji {
            font-size: 80px;
            animation: celebrate 1s infinite;
            margin-bottom: 16px;
        }
        @keyframes celebrate {
            0%, 100% { transform: scale(1) rotate(-5deg); }
            50% { transform: scale(1.2) rotate(5deg); }
        }
        .feedback-stars { font-size: 48px; margin-bottom: 16px; }
        .feedback-btn {
            background: var(--yellow); color: var(--black);
            border: 4px solid var(--black); border-radius: 16px;
            padding: 16px 32px; font-size: 32px;
            font-weight: 900; box-shadow: 4px 4px 0 var(--white);
            cursor: pointer; margin-top: 16px;
        }
        .feedback-btn:active {
            transform: translate(4px, 4px); box-shadow: none;
        }

        .trophy {
            font-size: 100px;
            animation: trophyBounce 1s infinite;
            margin-bottom: 16px;
        }
        @keyframes trophyBounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        .star-rating { font-size: 64px; margin: 16px 0; }
        .stats-visual {
            display: flex; gap: 20px; margin: 16px 0;
        }
        .stat-circle {
            width: 80px; height: 80px; border-radius: 50%;
            border: 4px solid var(--yellow);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: var(--black);
        }
        .stat-circle .number { font-size: 32px; font-weight: 900; color: var(--yellow); }
        .stat-circle .label { font-size: 10px; color: #aaa; font-weight: 700; }

        .certificate {
            background: var(--white); border: 4px solid var(--black);
            border-radius: 20px; padding: 32px;
            text-align: center; max-width: 400px;
            box-shadow: 8px 8px 0 var(--black);
        }
        .certificate h2 {
            font-size: 28px; font-weight: 900;
            font-style: italic; margin-bottom: 16px;
        }
        .certificate .badge {
            font-size: 80px; margin: 16px 0;
        }
        .certificate p {
            font-size: 16px; color: rgba(13,13,13,0.7);
            margin-bottom: 16px;
        }

        @media (max-width: 360px) {
            .pattern-item { width: 50px; height: 50px; font-size: 32px; }
            .choice-btn { width: 70px; height: 70px; font-size: 40px; }
            .mascot { font-size: 48px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="./index.html" class="btn-back">🔙</a>
        <div class="level-badge" id="level-display">1️⃣</div>
    </header>

    <div class="score-board">
        <div class="score-item stars">
            <span class="icon">⭐</span><span id="stars-count">0</span>
        </div>
        <div class="score-item hearts">
            <span class="icon">❌</span><span id="wrong-count">0</span>
        </div>
        <div class="score-item points">
            <span class="icon">💎</span><span id="total-score">0</span>
        </div>
    </div>

    <div class="game-container" id="game-container">
        <div class="mascot-area">
            <div class="mascot" id="mascot-emoji">🐝</div>
            <div class="mascot-bubble" id="mascot-bubble">🤔❓</div>
        </div>

        <div class="progress-area" id="progress-dots"></div>
        <div class="wrong-area" id="wrong-dots">
            <div class="wrong-dot"></div>
            <div class="wrong-dot"></div>
            <div class="wrong-dot"></div>
        </div>

        <div class="pattern-row" id="pattern-container"></div>

        <div class="choices-container" id="choices-container">
            <div class="choices-cue">⬇️</div>
            <div class="choices-row" id="choices-row"></div>
        </div>
    </div>

    <!-- CREATE PATTERN MODE (hidden by default) -->
    <div class="create-area" id="create-area" style="display: none;">
        <div class="create-instruction" id="create-instruction">Buat pola: 🍎🍌🍎🍌</div>
        <div class="pattern-builder" id="pattern-builder"></div>
        <div class="pattern-palette" id="pattern-palette"></div>
        <button class="feedback-btn" onclick="checkCreatedPattern()">✅ Cek Pola</button>
    </div>

    <div class="overlay" id="feedback-overlay">
        <div class="feedback-emoji" id="feedback-emoji">🎉</div>
        <div class="feedback-stars" id="feedback-stars"></div>
        <button class="feedback-btn" id="next-btn" onclick="nextQuestion()">▶️</button>
    </div>

    <div class="overlay" id="certificate-overlay">
        <div class="certificate">
            <h2>🏆 SERTIFIKAT</h2>
            <div class="badge" id="cert-badge">🕵️</div>
            <p id="cert-text">Selamat! Kamu telah menyelesaikan semua level Detektif Pola!</p>
            <div class="star-rating" id="cert-stars"></div>
            <button class="feedback-btn" onclick="restartGame()">🔄 Main Lagi</button>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════
        //  16 LEVELS - Progressive Unlock
        // ═══════════════════════════════════════════════════════
        const LEVELS = [
            // FASE 1: AB Pattern (Levels 1-4)
            { type: "fill", pattern: ["🍎","🍌","🍎","🍌","🍎","?"], answer: "🍌", choices: ["🍎","🍌","🍇"], unit: "🍎🍌", hint: "Lihat pasangan yang berulang!" },
            { type: "fill", pattern: ["🍎","🍌","🍎","?","🍎","🍌"], answer: "🍌", choices: ["🍎","🍌","🍇"], unit: "🍎🍌", hint: "Apa setelah 🍎?" },
            { type: "fill", pattern: ["🍎","🍌","?","🍌","🍎","🍌"], answer: "🍎", choices: ["🍎","🍌","🍇"], unit: "🍎🍌", hint: "Lihat awalnya!" },
            { type: "fill", pattern: ["?","🍌","🍎","🍌","🍎","🍌"], answer: "🍎", choices: ["🍎","🍌","🍇"], unit: "🍎🍌", hint: "Pola dimulai dengan?" },

            // FASE 2: ABC & AAB (Levels 5-8)
            { type: "fill", pattern: ["🐶","🐱","🐭","🐶","🐱","?"], answer: "🐭", choices: ["🐶","🐱","🐭"], unit: "🐶🐱🐭", hint: "3 hewan yang berulang!" },
            { type: "fill", pattern: ["🐶","🐱","?","🐶","🐱","🐭"], answer: "🐭", choices: ["🐶","🐱","🐭"], unit: "🐶🐱🐭", hint: "Hewan ke-3?" },
            { type: "fill", pattern: ["⭐","⭐","🌙","⭐","?","🌙"], answer: "⭐", choices: ["⭐","🌙","☀️"], unit: "⭐⭐🌙", hint: "Dua bintang, satu bulan!" },
            { type: "fill", pattern: ["⭐","?","🌙","⭐","⭐","🌙"], answer: "⭐", choices: ["⭐","🌙","☀️"], unit: "⭐⭐🌙", hint: "Bintang berpasangan!" },

            // FASE 3: Mixed & Create (Levels 9-12)
            { type: "fill", pattern: ["🍎","🍌","🍎","?","🍎","🍌"], answer: "🍌", choices: ["🍎","🍌","🐶"], unit: "?", hint: "AB atau ABC?" },
            { type: "fill", pattern: ["🐶","🐱","🐭","?","🐶","🐱"], answer: "🐭", choices: ["🐶","🐱","🐭"], unit: "?", hint: "Cari unit yang berulang!" },
            { type: "create", target: ["🍎","🍌","🍎","🍌"], palette: ["🍎","🍌","🍇"], unit: "🍎🍌", hint: "Buat pola apel-pisang!" },
            { type: "create", target: ["🐶","🐱","🐭","🐶","🐱","🐭"], palette: ["🐶","🐱","🐭","⭐"], unit: "🐶🐱🐭", hint: "Buat pola 3 hewan!" },

            // FASE 4: Unit Recognition & Mastery (Levels 13-16)
            { type: "fill", pattern: ["🔴","🟡","🔵","🔴","?","🔵"], answer: "🟡", choices: ["🔴","🟡","🔵"], unit: "🔴🟡🔵", hint: "Warna ke-2?" },
            { type: "fill", pattern: ["🟢","🟢","🟡","?","🟢","🟡"], answer: "🟢", choices: ["🟢","🟡","🔵"], unit: "🟢🟢🟡", hint: "Dua hijau, satu kuning!" },
            { type: "create", target: ["⭐","⭐","🌙","⭐","⭐","🌙"], palette: ["⭐","🌙","☀️","🍎"], unit: "⭐⭐🌙", hint: "Dua bintang, satu bulan!" },
            { type: "certificate", unit: "all", hint: "Selamat! 🎉" }
        ];

        let currentLevel = 0;
        let wrongCount = 0;
        let isProcessing = false;
        let gameStats = { stars: 0, score: 0, questions: 0, correct: 0, wrongTotal: 0 };

        // Load progress from localStorage
        function loadProgress() {
            const saved = localStorage.getItem('detektif_progress');
            if (saved) {
                const progress = parseInt(saved);
                if (progress > 0 && progress < LEVELS.length) {
                    currentLevel = progress;
                }
            }
        }

        function saveProgress() {
            localStorage.setItem('detektif_progress', currentLevel);
        }

        function initLevel() {
            wrongCount = 0; isProcessing = false;
            const level = LEVELS[currentLevel];
            
            document.getElementById('level-display').innerText = `${currentLevel + 1}️⃣`;
            document.getElementById('mascot-emoji').innerText = '🐝';
            document.getElementById('mascot-bubble').innerText = level.hint || '🤔❓';
            
            renderWrongDots();

            if (level.type === "fill") {
                showFillMode(level);
            } else if (level.type === "create") {
                showCreateMode(level);
            } else if (level.type === "certificate") {
                showCertificate();
            }
        }

        function showFillMode(level) {
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('create-area').style.display = 'none';

            const pc = document.getElementById('pattern-container');
            pc.innerHTML = '';
            level.pattern.forEach((item, idx) => {
                const div = document.createElement('div');
                if (item === "?") {
                    div.className = 'pattern-item missing';
                    div.id = 'missing-slot';
                } else {
                    div.className = 'pattern-item';
                    div.innerText = item;
                }
                pc.appendChild(div);
            });

            const cc = document.getElementById('choices-row');
            cc.innerHTML = '';
            level.choices.forEach(choice => {
                const btn = document.createElement('div');
                btn.className = 'choice-btn';
                btn.innerText = choice;
                btn.onclick = () => checkFillAnswer(choice, btn, level);
                cc.appendChild(btn);
            });
        }

        function showCreateMode(level) {
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('create-area').style.display = 'flex';
            
            document.getElementById('create-instruction').innerText = `Buat: ${level.unit}...`;

            const builder = document.getElementById('pattern-builder');
            builder.innerHTML = '';
            for (let i = 0; i < level.target.length; i++) {
                const slot = document.createElement('div');
                slot.className = 'pattern-item';
                slot.dataset.index = i;
                slot.innerText = '❓';
                slot.onclick = () => selectSlot(slot, level);
                builder.appendChild(slot);
            }

            const palette = document.getElementById('pattern-palette');
            palette.innerHTML = '';
            level.palette.forEach(item => {
                const btn = document.createElement('div');
                btn.className = 'palette-item';
                btn.innerText = item;
                btn.onclick = () => selectPaletteItem(item, btn);
                palette.appendChild(btn);
            });
        }

        let selectedSlot = null;
        let selectedItem = null;
        let builtPattern = [];

        function selectSlot(slot, level) {
            document.querySelectorAll('.pattern-item').forEach(s => s.classList.remove('selected'));
            slot.classList.add('selected');
            selectedSlot = slot;
            
            if (selectedItem) {
                slot.innerText = selectedItem;
                builtPattern[parseInt(slot.dataset.index)] = selectedItem;
                selectedItem = null;
                document.querySelectorAll('.palette-item').forEach(p => p.classList.remove('selected'));
            }
        }

        function selectPaletteItem(item, btn) {
            document.querySelectorAll('.palette-item').forEach(p => p.classList.remove('selected'));
            btn.classList.add('selected');
            selectedItem = item;
            
            if (selectedSlot) {
                selectedSlot.innerText = item;
                builtPattern[parseInt(selectedSlot.dataset.index)] = item;
                selectedSlot = null;
                selectedItem = null;
                document.querySelectorAll('.palette-item').forEach(p => p.classList.remove('selected'));
            }
        }

        function checkCreatedPattern() {
            const level = LEVELS[currentLevel];
            const isCorrect = level.target.every((item, idx) => builtPattern[idx] === item);
            
            if (isCorrect) {
                finishLevel(true);
            } else {
                wrongCount++;
                gameStats.wrongTotal++;
                renderWrongDots();
                document.getElementById('mascot-bubble').innerText = 'Coba lagi! 😢';
                // Reset
                builtPattern = [];
                document.querySelectorAll('.pattern-item').forEach(s => s.innerText = '❓');
            }
        }

        function checkFillAnswer(choice, btn, level) {
            if (isProcessing) return;
            
            if (choice === level.answer) {
                isProcessing = true;
                btn.classList.add('correct');
                
                const slot = document.getElementById('missing-slot');
                if (slot) {
                    slot.innerText = choice;
                    slot.classList.remove('missing');
                    slot.classList.add('correct-fill');
                }
                
                setTimeout(() => finishLevel(true), 600);
            } else {
                wrongCount++;
                gameStats.wrongTotal++;
                btn.classList.add('wrong');
                renderWrongDots();
                
                setTimeout(() => btn.classList.remove('wrong'), 400);
            }
        }

        function finishLevel(isCorrect) {
            if (!isCorrect) return;
            
            let points = 0;
            if (wrongCount === 0) points = 100;
            else if (wrongCount <= 2) points = 50;
            else points = 25;
            
            gameStats.score += points;
            gameStats.questions++;
            gameStats.correct++;
            
            saveProgress();
            
            if (currentLevel < LEVELS.length - 1) {
                currentLevel++;
                showFeedback();
            } else {
                showCertificate();
            }
        }

        function showFeedback() {
            document.getElementById('feedback-overlay').classList.add('show');
        }

        function nextQuestion() {
            document.getElementById('feedback-overlay').classList.remove('show');
            initLevel();
        }

        function showCertificate() {
            const stars = Math.min(3, Math.floor(gameStats.correct / 5));
            document.getElementById('cert-stars').innerText = '⭐'.repeat(stars);
            document.getElementById('cert-text').innerText = `Skor: ${gameStats.score} | Benar: ${gameStats.correct}/${gameStats.questions}`;
            document.getElementById('certificate-overlay').classList.add('show');
        }

        function restartGame() {
            currentLevel = 0;
            gameStats = { stars: 0, score: 0, questions: 0, correct: 0, wrongTotal: 0 };
            localStorage.removeItem('detektif_progress');
            document.getElementById('certificate-overlay').classList.remove('show');
            initLevel();
        }

        function renderWrongDots() {
            document.querySelectorAll('.wrong-dot').forEach((d, i) => {
                d.className = 'wrong-dot' + (i < wrongCount ? ' filled' : '');
            });
        }

        // Init
        loadProgress();
        initLevel();
    </script>
</body>
</html>
