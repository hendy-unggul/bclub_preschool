<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFE600">
    <title>Masak Bareng - B Club</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        :root {
            --black: #0D0D0D; --yellow: #FFE600; --coral: #FF4D4D; 
            --white: #FFFFFF; --gray: #F5F5F0; --green: #00E676;
            --orange: #FF9800; --blue: #2196F3;
        }

        body {
            background: var(--gray); color: var(--black);
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; touch-action: manipulation;
        }

        header {
            background: var(--black); padding: 8px 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--yellow);
        }
        .btn-back {
            background: var(--white); border: 3px solid var(--black);
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; box-shadow: 3px 3px 0 var(--black);
            cursor: pointer; text-decoration: none;
        }
        .btn-back:active { transform: translate(3px, 3px); box-shadow: none; }
        .level-badge {
            background: var(--yellow); border: 3px solid var(--black);
            padding: 6px 16px; border-radius: 20px;
            font-weight: 900; font-size: 16px; box-shadow: 3px 3px 0 var(--black);
        }

        .score-board {
            display: flex; gap: 20px; justify-content: center;
            padding: 10px; background: var(--white);
            border-bottom: 3px solid var(--black);
        }
        .score-item {
            display: flex; align-items: center; gap: 6px;
            font-size: 24px; font-weight: 900;
        }
        .score-item .icon { font-size: 28px; }
        .score-item.stars { color: #FF9800; }
        .score-item.hearts { color: var(--coral); }
        .score-item.points { color: var(--green); }

        .mascot-area {
            display: flex; justify-content: center; align-items: center;
            padding: 12px; gap: 12px;
        }
        .mascot {
            font-size: 64px;
            animation: mascotBounce 2s infinite;
            filter: drop-shadow(3px 3px 0 var(--black));
        }
        @keyframes mascotBounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        .mascot-bubble {
            background: var(--white); border: 4px solid var(--black);
            padding: 12px 20px; border-radius: 20px;
            box-shadow: 4px 4px 0 var(--black);
            position: relative; font-size: 24px;
            max-width: 200px; text-align: center;
        }
        .mascot-bubble::after {
            content: ''; position: absolute; left: -16px; top: 50%;
            transform: translateY(-50%);
            border-width: 12px 16px 12px 0;
            border-style: solid;
            border-color: transparent var(--black) transparent transparent;
        }
        .mascot-bubble::before {
            content: ''; position: absolute; left: -10px; top: 50%;
            transform: translateY(-50%); z-index: 1;
            border-width: 10px 14px 10px 0;
            border-style: solid;
            border-color: transparent var(--white) transparent transparent;
        }

        .progress-area {
            display: flex; justify-content: center; gap: 8px;
            padding: 6px;
        }
        .progress-dot {
            width: 16px; height: 16px; border-radius: 50%;
            border: 3px solid var(--black); background: var(--white);
            transition: all 0.3s;
        }
        .progress-dot.done { background: var(--green); transform: scale(1.2); }
        .progress-dot.current {
            background: var(--yellow);
            animation: pulseDot 1s infinite;
            transform: scale(1.3);
        }
        @keyframes pulseDot {
            0%, 100% { box-shadow: 0 0 0 0 var(--yellow); }
            50% { box-shadow: 0 0 0 8px rgba(255, 230, 0, 0); }
        }

        .wrong-area {
            display: flex; justify-content: center; gap: 8px;
            min-height: 40px; align-items: center;
        }
        .wrong-dot {
            width: 20px; height: 20px; border-radius: 50%;
            background: var(--white); border: 3px solid var(--coral);
            transition: all 0.3s;
        }
        .wrong-dot.filled {
            background: var(--coral);
            animation: wrongPulse 0.5s;
        }
        @keyframes wrongPulse {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .recipe-title {
            text-align: center; padding: 12px;
            font-size: 24px; font-weight: 900;
            color: var(--black);
        }

        .sequence-slots {
            display: flex; gap: 8px; margin: 12px 16px;
            background: var(--white); padding: 12px; border-radius: 20px;
            border: 4px solid var(--black); box-shadow: 6px 6px 0 var(--black);
            justify-content: center; flex-wrap: wrap;
        }
        .sequence-slot {
            width: 70px; height: 90px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-size: 16px; background: var(--gray);
            border-radius: 12px; border: 3px dashed var(--black);
            box-shadow: 2px 2px 0 var(--black);
            transition: all 0.3s ease;
        }
        .sequence-slot .slot-number {
            font-size: 14px; font-weight: 900;
            color: var(--black); margin-bottom: 4px;
        }
        .sequence-slot .slot-emoji {
            font-size: 32px;
        }
        .sequence-slot.filled {
            background: var(--green);
            border: 3px solid var(--black);
            animation: slotFill 0.5s;
        }
        @keyframes slotFill {
            0% { transform: scale(0.5); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .sequence-slot.current {
            background: var(--yellow);
            border: 3px solid var(--black);
            animation: pulseCurrent 1.5s infinite;
        }
        @keyframes pulseCurrent {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .steps-container {
            display: flex; flex-direction: column;
            align-items: center; gap: 12px;
            padding: 12px;
        }
        .steps-cue {
            font-size: 36px;
            animation: cueBounce 1s infinite;
            margin-bottom: 4px;
        }
        @keyframes cueBounce {
            0%, 100% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(-8px); opacity: 0.7; }
        }
        .steps-row {
            display: flex; gap: 12px; justify-content: center;
            flex-wrap: wrap;
        }
        .step-btn {
            width: 80px; height: 100px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-size: 14px; background: var(--white);
            border: 4px solid var(--black); border-radius: 16px;
            box-shadow: 5px 5px 0 var(--black);
            cursor: pointer; transition: all 0.15s;
            padding: 8px;
        }
        .step-btn .step-emoji {
            font-size: 36px; margin-bottom: 4px;
        }
        .step-btn .step-text {
            font-size: 11px; font-weight: 700;
            text-align: center; line-height: 1.2;
        }
        .step-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 1px 1px 0 var(--black);
        }
        .step-btn.correct {
            background: var(--green);
            animation: bigPop 0.4s;
            box-shadow: 5px 5px 0 #004d00;
            opacity: 0.5;
            pointer-events: none;
        }
        .step-btn.wrong {
            background: var(--coral);
            animation: bigShake 0.5s;
            box-shadow: 5px 5px 0 #800000;
        }
        /* FIX: Jangan pakai .disabled class untuk salah */
        @keyframes bigPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        @keyframes bigShake {
            0%, 100% { transform: translateX(0) rotate(0); }
            20% { transform: translateX(-8px) rotate(-3deg); }
            40% { transform: translateX(8px) rotate(3deg); }
            60% { transform: translateX(-6px) rotate(-2deg); }
            80% { transform: translateX(6px) rotate(2deg); }
        }

        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(13,13,13,0.92);
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; padding: 20px;
        }
        .overlay.show { display: flex; }

        .feedback-emoji {
            font-size: 80px;
            animation: celebrate 1s infinite;
            margin-bottom: 16px;
        }
        @keyframes celebrate {
            0%, 100% { transform: scale(1) rotate(-5deg); }
            50% { transform: scale(1.2) rotate(5deg); }
        }
        .feedback-stars { font-size: 48px; margin-bottom: 16px; }
        .feedback-btn {
            background: var(--yellow); color: var(--black);
            border: 4px solid var(--black); border-radius: 16px;
            padding: 16px 32px; font-size: 32px;
            font-weight: 900; box-shadow: 4px 4px 0 var(--white);
            cursor: pointer; margin-top: 16px;
        }
        .feedback-btn:active {
            transform: translate(4px, 4px); box-shadow: none;
        }

        .trophy {
            font-size: 100px;
            animation: trophyBounce 1s infinite;
            margin-bottom: 16px;
        }
        @keyframes trophyBounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        .star-rating { font-size: 64px; margin: 16px 0; }
        .stats-visual {
            display: flex; gap: 20px; margin: 16px 0;
        }
        .stat-circle {
            width: 80px; height: 80px; border-radius: 50%;
            border: 4px solid var(--yellow);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: var(--black);
        }
        .stat-circle .number { font-size: 32px; font-weight: 900; color: var(--yellow); }
        .stat-circle .label { font-size: 10px; color: #aaa; font-weight: 700; }

        @media (max-width: 360px) {
            .sequence-slot { width: 60px; height: 80px; }
            .step-btn { width: 70px; height: 90px; }
            .step-btn .step-emoji { font-size: 28px; }
            .mascot { font-size: 48px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="./index.html" class="btn-back">🔙</a>
        <div class="level-badge" id="level-display">1️⃣</div>
    </header>

    <div class="score-board">
        <div class="score-item stars">
            <span class="icon">⭐</span><span id="stars-count">0</span>
        </div>
        <div class="score-item hearts">
            <span class="icon">❌</span><span id="wrong-count">0</span>
        </div>
        <div class="score-item points">
            <span class="icon">💎</span><span id="total-score">0</span>
        </div>
    </div>

    <div class="game-container">
        <div class="mascot-area">
            <div class="mascot" id="mascot-emoji">👨‍🍳</div>
            <div class="mascot-bubble" id="mascot-bubble">Urutkan langkahnya! 🤔</div>
        </div>

        <div class="progress-area" id="progress-dots"></div>
        <div class="wrong-area" id="wrong-dots">
            <div class="wrong-dot"></div>
            <div class="wrong-dot"></div>
            <div class="wrong-dot"></div>
        </div>

        <div class="recipe-title" id="recipe-title">🥪 Roti Selai</div>

        <div class="sequence-slots" id="sequence-slots"></div>

        <div class="steps-container">
            <div class="steps-cue">⬇️</div>
            <div class="steps-row" id="steps-container"></div>
        </div>
    </div>

    <div class="overlay" id="feedback-overlay">
        <div class="feedback-emoji" id="feedback-emoji">🎉</div>
        <div class="feedback-stars" id="feedback-stars"></div>
        <button class="feedback-btn" id="next-btn" onclick="nextQuestion()">▶️</button>
    </div>

    <div class="overlay" id="level-complete-overlay">
        <div class="trophy">🏆</div>
        <div class="star-rating" id="level-stars"></div>
        <div class="stats-visual">
            <div class="stat-circle"><div class="number" id="stat-first">0</div><div class="label">🥇0❌</div></div>
            <div class="stat-circle"><div class="number" id="stat-second">0</div><div class="label">🥈1-2❌</div></div>
            <div class="stat-circle"><div class="number" id="stat-third">0</div><div class="label">🥉3+❌</div></div>
        </div>
        <button class="feedback-btn" onclick="nextLevel()">▶️▶️</button>
        <button class="feedback-btn" onclick="restartLevel()" style="background: var(--white); margin-top: 8px;">🔄</button>
    </div>

    <div class="overlay" id="game-complete-overlay">
        <div class="trophy">👑</div>
        <div class="star-rating" id="final-stars"></div>
        <div class="stats-visual">
            <div class="stat-circle"><div class="number" id="final-total-stars">0</div><div class="label">⭐Total</div></div>
            <div class="stat-circle"><div class="number" id="final-total-score">0</div><div class="label">💎Score</div></div>
            <div class="stat-circle"><div class="number" id="final-accuracy">0%</div><div class="label">🎯Rate</div></div>
        </div>
        <button class="feedback-btn" onclick="restartGame()" style="margin-top: 16px;">🔄🎮</button>
    </div>

    <script>
        const CONFIG = {
            QUESTIONS_PER_LEVEL: 5,
            SCORE_FIRST: 100, SCORE_SECOND: 50, SCORE_THIRD: 25
        };

        const TEMPLATES = [
            {
                name: "1️⃣",
                title: "🥪 Roti Selai",
                mascot: { think: "Urutkan! 🤔", happy: "Benar! 😄", sad: "Oops! 😢" },
                questions: [
                    { steps: [{ emoji: "🍞", text: "Ambil Roti" }, { emoji: "🥄", text: "Oles Selai" }, { emoji: "🥪", text: "Tutup Roti" }] },
                    { steps: [{ emoji: "🥛", text: "Siapkan Susu" }, { emoji: "🍫", text: "Tambah Coklat" }, { emoji: "🥤", text: "Aduk Rata" }] },
                    { steps: [{ emoji: "🍌", text: "Kupas Pisang" }, { emoji: "🥣", text: "Taruh di Mangkuk" }, { emoji: "🥄", text: "Hancurkan" }] },
                    { steps: [{ emoji: "🍎", text: "Cuci Apel" }, { emoji: "🔪", text: "Potong Apel" }, { emoji: "🍽️", text: "Sajikan" }] },
                    { steps: [{ emoji: "🥚", text: "Pecahkan Telur" }, { emoji: "🍳", text: "Goreng Telur" }, { emoji: "🍽️", text: "Angkat" }] }
                ]
            },
            {
                name: "2️⃣",
                title: "☕ Teh Manis",
                mascot: { think: "4 langkah! 🤔", happy: "Hebat! 🤩", sad: "Coba lagi! 😵" },
                questions: [
                    { steps: [{ emoji: "🫖", text: "Siapkan Gelas" }, { emoji: "🍵", text: "Masukkan Teh" }, { emoji: "💧", text: "Tuang Air Panas" }, { emoji: "🍯", text: "Tambah Gula" }] },
                    { steps: [{ emoji: "🍚", text: "Cuci Beras" }, { emoji: "🍲", text: "Masukkan Rice Cooker" }, { emoji: "💧", text: "Tambah Air" }, { emoji: "⏰", text: "Tekan Tombol" }] },
                    { steps: [{ emoji: "🥕", text: "Kupas Wortel" }, { emoji: "🔪", text: "Potong Wortel" }, { emoji: "🍳", text: "Tumis Wortel" }, { emoji: "🧂", text: "Tambah Garam" }] },
                    { steps: [{ emoji: "🍋", text: "Peras Lemon" }, { emoji: "🥤", text: "Tuang ke Gelas" }, { emoji: "💧", text: "Tambah Air" }, { emoji: "🧊", text: "Tambah Es" }] },
                    { steps: [{ emoji: "🥔", text: "Kupas Kentang" }, { emoji: "🔪", text: "Potong Kentang" }, { emoji: "🍳", text: "Goreng Kentang" }, { emoji: "🧂", text: "Bumbui" }] }
                ]
            },
            {
                name: "3️⃣",
                title: "🥙 Sandwich",
                mascot: { think: "5 langkah! 🤔", happy: "Sempurna! 🥳", sad: "Hampir! 🙀" },
                questions: [
                    { steps: [{ emoji: "🍞", text: "Ambil 2 Roti" }, { emoji: "🧈", text: "Oles Mentega" }, { emoji: "🧀", text: "Taruh Keju" }, { emoji: "🍅", text: "Taruh Tomat" }, { emoji: "🥙", text: "Tutup Roti" }] },
                    { steps: [{ emoji: "🍝", text: "Rebus Pasta" }, { emoji: "🍅", text: "Buat Saus" }, { emoji: "🧀", text: "Tambah Keju" }, { emoji: "🌿", text: "Taburi Herbs" }, { emoji: "🍽️", text: "Sajikan" }] },
                    { steps: [{ emoji: "🥗", text: "Cuci Sayur" }, { emoji: "🔪", text: "Potong Sayur" }, { emoji: "🥕", text: "Tambah Wortel" }, { emoji: "🥒", text: "Tambah Timun" }, { emoji: "🥗", text: "Campur Rata" }] },
                    { steps: [{ emoji: "🍕", text: "Siapkan Adonan" }, { emoji: "🍅", text: "Oles Saus Tomat" }, { emoji: "🧀", text: "Taburi Keju" }, { emoji: "🍖", text: "Taruh Topping" }, { emoji: "🔥", text: "Panggang" }] },
                    { steps: [{ emoji: "🥞", text: "Buat Adonan" }, { emoji: "🍳", text: "Panaskan Wajan" }, { emoji: "🥞", text: "Tuang Adonan" }, { emoji: "🍯", text: "Balik Pancake" }, { emoji: "🍽️", text: "Sajikan" }] }
                ]
            }
        ];

        let currentLevel = 0, currentQuestion = 0, currentStepIndex = 0, isProcessing = false;
        let wrongCount = 0;
        let levelStats = { first: 0, second: 0, third: 0, score: 0 };
        let gameStats = { stars: 0, score: 0, questions: 0, correct: 0, wrongTotal: 0 };
        let currentQuestions = [];

        function initLevel() {
            currentQuestion = 0; currentStepIndex = 0; isProcessing = false;
            wrongCount = 0;
            levelStats = { first: 0, second: 0, third: 0, score: 0 };
            const t = TEMPLATES[currentLevel];
            currentQuestions = [];
            
            for (let i = 0; i < CONFIG.QUESTIONS_PER_LEVEL; i++) {
                const q = t.questions[i];
                const shuffledSteps = [...q.steps].sort(() => Math.random() - 0.5);
                currentQuestions.push({
                    steps: q.steps,
                    shuffledSteps: shuffledSteps
                });
            }
            renderProgressDots(); updateScoreBoard(); renderWrongDots(); renderQuestion();
        }

        function renderProgressDots() {
            const c = document.getElementById('progress-dots');
            c.innerHTML = '';
            for (let i = 0; i < CONFIG.QUESTIONS_PER_LEVEL; i++) {
                const d = document.createElement('div');
                d.className = 'progress-dot';
                if (i < currentQuestion) d.classList.add('done');
                else if (i === currentQuestion) d.classList.add('current');
                c.appendChild(d);
            }
        }

        function renderWrongDots() {
            document.querySelectorAll('.wrong-dot').forEach((d, i) => {
                d.className = 'wrong-dot' + (i < wrongCount ? ' filled' : '');
            });
        }

        function renderQuestion() {
            const t = TEMPLATES[currentLevel];
            const q = currentQuestions[currentQuestion];
            currentStepIndex = 0; wrongCount = 0;
            
            document.getElementById('level-display').innerText = t.name;
            document.getElementById('recipe-title').innerText = t.title;
            document.getElementById('mascot-emoji').innerText = '👨‍🍳';
            document.getElementById('mascot-bubble').innerText = t.mascot.think;
            renderWrongDots(); renderProgressDots();

            const slotsContainer = document.getElementById('sequence-slots');
            slotsContainer.innerHTML = '';
            q.steps.forEach((step, index) => {
                const slot = document.createElement('div');
                slot.className = 'sequence-slot' + (index === 0 ? ' current' : '');
                slot.innerHTML = `<div class="slot-number">${index + 1}</div><div class="slot-emoji">❓</div>`;
                slot.dataset.index = index;
                slotsContainer.appendChild(slot);
            });

            const stepsContainer = document.getElementById('steps-container');
            stepsContainer.innerHTML = '';
            q.shuffledSteps.forEach((step) => {
                const btn = document.createElement('div');
                btn.className = 'step-btn';
                btn.innerHTML = `<div class="step-emoji">${step.emoji}</div><div class="step-text">${step.text}</div>`;
                btn.dataset.emoji = step.emoji;
                btn.dataset.text = step.text;
                btn.onclick = () => checkAnswer(step, btn);
                stepsContainer.appendChild(btn);
            });
        }

        // ═══════════════════════════════════════════════════════
        //  FIX: checkAnswer - JANGAN disable tombol yang salah!
        // ═══════════════════════════════════════════════════════
        function checkAnswer(selectedStep, btnElement) {
            if (isProcessing) return;
            
            const q = currentQuestions[currentQuestion];
            const correctStep = q.steps[currentStepIndex];
            const t = TEMPLATES[currentLevel];

            if (selectedStep.emoji === correctStep.emoji && selectedStep.text === correctStep.text) {
                // ✓ BENAR
                isProcessing = true;
                btnElement.classList.add('correct');
                
                // Fill slot
                const slots = document.querySelectorAll('.sequence-slot');
                const currentSlot = slots[currentStepIndex];
                currentSlot.innerHTML = `<div class="slot-number">${currentStepIndex + 1}</div><div class="slot-emoji">${correctStep.emoji}</div>`;
                currentSlot.classList.remove('current');
                currentSlot.classList.add('filled');
                
                currentStepIndex++;
                
                if (currentStepIndex < q.steps.length) {
                    // Next step
                    slots[currentStepIndex].classList.add('current');
                    isProcessing = false;
                    document.getElementById('mascot-bubble').innerText = t.mascot.happy;
                } else {
                    // All done
                    finishQuestion(t);
                }
                
            } else {
                // ✗ SALAH - JANGAN disable, biarkan coba lagi!
                wrongCount++;
                gameStats.wrongTotal++;
                btnElement.classList.add('wrong');
                
                renderWrongDots();
                updateScoreBoard();
                document.getElementById('mascot-bubble').innerText = t.mascot.sad;
                
                // FIX: Hanya hapus class wrong, JANGAN disable
                setTimeout(() => {
                    btnElement.classList.remove('wrong');
                    // NO btnElement.classList.add('disabled') ← DIHAPUS
                }, 400);
            }
        }

        function finishQuestion(t) {
            let points = 0, type = '';
            
            if (wrongCount === 0) {
                points = CONFIG.SCORE_FIRST;
                levelStats.first++;
                type = 'first';
                document.getElementById('mascot-bubble').innerText = t.mascot.happy;
            } else if (wrongCount <= 2) {
                points = CONFIG.SCORE_SECOND;
                levelStats.second++;
                type = 'second';
                document.getElementById('mascot-bubble').innerText = t.mascot.happy;
            } else {
                points = CONFIG.SCORE_THIRD;
                levelStats.third++;
                type = 'third';
                document.getElementById('mascot-bubble').innerText = '😅👍';
            }
            
            levelStats.score += points;
            gameStats.score += points;
            gameStats.questions++;
            gameStats.correct++;
            
            updateScoreBoard();
            setTimeout(() => showFeedback(true, type, points), 800);
        }

        function showFeedback(isCorrect, type, points) {
            const o = document.getElementById('feedback-overlay');
            const e = document.getElementById('feedback-emoji');
            const s = document.getElementById('feedback-stars');
            const b = document.getElementById('next-btn');
            
            if (isCorrect) {
                if (type === 'first') { e.innerText = '🤩'; s.innerText = '⭐⭐⭐'; }
                else if (type === 'second') { e.innerText = '😄'; s.innerText = '⭐⭐'; }
                else { e.innerText = '👍'; s.innerText = '⭐'; }
                b.innerText = currentQuestion < CONFIG.QUESTIONS_PER_LEVEL - 1 ? '▶️' : '📊';
            }
            o.classList.add('show');
        }

        function nextQuestion() {
            document.getElementById('feedback-overlay').classList.remove('show');
            isProcessing = false;
            
            if (currentQuestion < CONFIG.QUESTIONS_PER_LEVEL - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showLevelComplete();
            }
        }

        function showLevelComplete() {
            const o = document.getElementById('level-complete-overlay');
            let stars = '';
            if (levelStats.first >= 4) { stars = '⭐⭐⭐'; gameStats.stars += 3; }
            else if (levelStats.first >= 2) { stars = '⭐⭐'; gameStats.stars += 2; }
            else { stars = '⭐'; gameStats.stars += 1; }
            
            document.getElementById('level-stars').innerText = stars;
            document.getElementById('stat-first').innerText = levelStats.first;
            document.getElementById('stat-second').innerText = levelStats.second;
            document.getElementById('stat-third').innerText = levelStats.third;
            updateScoreBoard();
            o.classList.add('show');
        }

        function nextLevel() {
            document.getElementById('level-complete-overlay').classList.remove('show');
            if (currentLevel < TEMPLATES.length - 1) { currentLevel++; initLevel(); }
            else { showGameComplete(); }
        }

        function restartLevel() {
            document.getElementById('level-complete-overlay').classList.remove('show');
            gameStats.stars -= document.getElementById('level-stars').innerText.length;
            initLevel();
        }

        function showGameComplete() {
            const o = document.getElementById('game-complete-overlay');
            const maxStars = TEMPLATES.length * 3;
            const rating = Math.max(1, Math.round((gameStats.stars / maxStars) * 3));
            let fs = '';
            for (let i = 0; i < rating; i++) fs += '⭐';
            
            document.getElementById('final-stars').innerText = fs;
            document.getElementById('final-total-stars').innerText = gameStats.stars;
            document.getElementById('final-total-score').innerText = gameStats.score;
            const acc = gameStats.questions > 0 ? Math.round((gameStats.correct / gameStats.questions) * 100) : 0;
            document.getElementById('final-accuracy').innerText = acc + '%';
            o.classList.add('show');
        }

        function restartGame() {
            document.getElementById('game-complete-overlay').classList.remove('show');
            currentLevel = 0;
            gameStats = { stars: 0, score: 0, questions: 0, correct: 0, wrongTotal: 0 };
            initLevel();
        }

        function updateScoreBoard() {
            document.getElementById('stars-count').innerText = gameStats.stars;
            document.getElementById('wrong-count').innerText = gameStats.wrongTotal;
            document.getElementById('total-score').innerText = gameStats.score;
        }

        initLevel();
    </script>
</body>
</html>
