<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFE600">
    <title>B Club - Detektif Cilik</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/icon-192.png">
    <link rel="apple-touch-icon" href="assets/icon-192.png">

    <style>
        /* ── RESET & ROOT ── */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        :root {
            --black: #0D0D0D;
            --yellow: #FFE600;
            --coral: #FF4D4D;
            --white: #FFFFFF;
            --gray: #F5F5F0;
        }

        body {
            background: var(--gray);
            color: var(--black);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            padding-bottom: 80px; /* Space for sticky footer */
        }

        /* ── HEADER ── */
        header {
            background: var(--black);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--yellow);
        }
        .logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--yellow);
            font-style: italic;
            letter-spacing: -1px;
        }
        .logo span { color: var(--white); }
        .level-badge {
            background: var(--coral);
            color: var(--white);
            font-size: 12px;
            font-weight: 800;
            padding: 6px 12px;
            border-radius: 20px;
        }

        /* ── HERO SECTION ── */
        .hero {
            background: var(--black);
            color: var(--white);
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }
        .mascot {
            font-size: 80px;
            display: block;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .hero h1 {
            font-size: 28px;
            font-weight: 900;
            font-style: italic;
            line-height: 1.1;
            margin-bottom: 8px;
        }
        .hero h1 .y { color: var(--yellow); }
        .hero p {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
        }

        /* ── GAME GRID ── */
        .games-section {
            padding: 24px 20px;
            flex: 1;
        }
        .section-title {
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 16px;
            font-style: italic;
        }
        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .game-card {
            background: var(--white);
            border: 3px solid var(--black);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            box-shadow: 4px 4px 0 var(--black);
            transition: transform 0.1s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .game-card:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 var(--black);
        }
        .game-card.locked {
            opacity: 0.5;
            filter: grayscale(100%);
        }
        .game-icon {
            font-size: 40px;
            display: block;
            margin-bottom: 8px;
        }
        .game-title {
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 8px;
            line-height: 1.2;
        }
        .level-dots {
            display: flex;
            justify-content: center;
            gap: 4px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ddd;
            border: 1px solid var(--black);
        }
        .dot.active { background: var(--yellow); }
        .dot.completed { background: var(--coral); }

        /* ── STICKY FOOTER (Parent Link) ── */
        .sticky-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--black);
            border-top: 3px solid var(--yellow);
            padding: 12px 20px;
            text-align: center;
            z-index: 100;
        }
        .parent-link {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .parent-link:hover { color: var(--white); }

        /* ── INSTALL PROMPT (PWA) ── */
        #install-banner {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            background: var(--yellow);
            color: var(--black);
            padding: 12px 20px;
            font-weight: 800;
            font-size: 14px;
            z-index: 1000;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--black);
        }
        #install-banner button {
            background: var(--black);
            color: var(--yellow);
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <!-- PWA Install Banner -->
    <div id="install-banner">
        <span> Install B Club di HP kamu!</span>
        <button onclick="installPWA()">Install</button>
    </div>

    <!-- Header -->
    <header>
        <div class="logo">B<span>Club</span></div>
        <div class="level-badge">⭐ Level 1</div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <span class="mascot"></span>
        <h1>Halo Detektif Cilik!<br><span class="y">Siap Berpetualang?</span></h1>
        <p>Pilih permainanmu dan kumpulkan semua bintang!</p>
    </section>

    <!-- Games Grid -->
    <section class="games-section">
        <h2 class="section-title">Pilih Misi Kamu:</h2>
        <div class="game-grid">
            
            <!-- Game 1: Active -->
            <div class="game-card" onclick="startGame('pola')">
                <span class="game-icon"></span>
                <div class="game-title">Detektif<br>Pola</div>
                <div class="level-dots">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>

            <!-- Game 2: Locked -->
            <div class="game-card locked">
                <span class="game-icon">🍳</span>
                <div class="game-title">Masak<br>Bareng</div>
                <div class="level-dots">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>

            <!-- Game 3: Locked -->
            <div class="game-card locked">
                <span class="game-icon">🃏</span>
                <div class="game-title">Kartu<br>Memori</div>
                <div class="level-dots">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>

            <!-- Game 4: Locked -->
            <div class="game-card locked">
                <span class="game-icon">⚙️</span>
                <div class="game-title">Mesin<br>Ajaib</div>
                <div class="level-dots">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>

        </div>
    </section>

    <!-- Sticky Footer -->
    <footer class="sticky-footer">
        <a href="parents.html" class="parent-link">🔒 Untuk Ayah/Bunda/Guru →</a>
    </footer>

    <script>
        // ── PWA Service Worker Registration ──
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered:', reg))
                    .catch(err => console.log('SW failed:', err));
            });
        }

        // ── PWA Install Prompt Logic ──
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').style.display = 'flex';
        });

        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                    }
                    deferredPrompt = null;
                    document.getElementById('install-banner').style.display = 'none';
                });
            }
        }

        // ── Game Navigation (Dummy for now) ─
        function startGame(gameId) {
            if(gameId === 'pola') {
                // Nanti kita arahkan ke game.html
                alert('Membuka Detektif Pola... (Akan dibuat di langkah berikutnya)');
                // window.location.href = 'game.html?game=pola&level=1';
            } else {
                alert('Selesaikan Detektif Pola dulu untuk membuka misi ini!');
            }
        }
    </script>
</body>
</html>
