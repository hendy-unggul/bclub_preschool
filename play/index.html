<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFE600">
    <title>B Club — Game Edukatif</title>
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiQiBDbHViIC0gR2FtZSIsInNob3J0X25hbWUiOiJCIENsdWIiLCJzdGFydF91cmwiOiIuL2luZGV4Lmh0bWwiLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjRjVGNUYwIiwidGhlbWVfY29sb3IiOiIjRkZFNjAwIiwib3JpZW50YXRpb24iOiJwb3J0cmFpdCJ9">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        :root {
            --black: #0D0D0D; --yellow: #FFE600; --coral: #FF4D4D;
            --white: #FFFFFF; --gray: #F5F5F0; --green: #00E676;
        }

        body {
            background: var(--gray); color: var(--black);
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            overflow-x: hidden; touch-action: manipulation;
        }

        header {
            background: var(--black); padding: 12px 16px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--yellow);
        }
        .btn-back {
            background: var(--white); border: 3px solid var(--black);
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; box-shadow: 3px 3px 0 var(--black);
            cursor: pointer; text-decoration: none;
        }
        .btn-back:active { transform: translate(3px, 3px); box-shadow: none; }
        .page-title {
            color: var(--yellow); font-size: 20px; font-weight: 900;
            font-style: italic;
        }

        .hero {
            background: var(--black); padding: 32px 20px;
            text-align: center; position: relative; overflow: hidden;
        }
        .hero-emoji {
            font-size: 80px;
            animation: bounce 2s infinite;
            display: block; margin-bottom: 12px;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .hero-title {
            font-size: 32px; font-weight: 900; color: var(--white);
            font-style: italic; letter-spacing: -1px;
            margin-bottom: 8px;
        }
        .hero-title span { color: var(--yellow); }
        .hero-sub {
            font-size: 14px; color: rgba(255,255,255,0.6);
            max-width: 280px; margin: 0 auto;
        }

        .games-grid {
            display: flex; flex-direction: column;
            gap: 16px; padding: 20px;
            flex: 1;
        }
        .game-card {
            background: var(--white);
            border: 4px solid var(--black);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 6px 6px 0 var(--black);
            display: flex; gap: 16px;
            align-items: center;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            color: var(--black);
        }
        .game-card:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0 var(--black);
        }
        .game-icon {
            font-size: 56px;
            width: 80px; height: 80px;
            display: flex; justify-content: center; align-items: center;
            background: var(--yellow);
            border-radius: 16px;
            border: 3px solid var(--black);
            flex-shrink: 0;
        }
        .game-info { flex: 1; }
        .game-name {
            font-size: 22px; font-weight: 900;
            font-style: italic; margin-bottom: 4px;
        }
        .game-desc {
            font-size: 13px; color: var(--textmuted);
            line-height: 1.5;
        }
        .game-badge {
            display: inline-block;
            background: var(--green); color: var(--black);
            font-size: 10px; font-weight: 800;
            padding: 4px 10px; border-radius: 20px;
            margin-top: 8px;
            border: 2px solid var(--black);
        }

        .stats-bar {
            background: var(--yellow);
            border-top: 3px solid var(--black);
            border-bottom: 3px solid var(--black);
            display: flex; justify-content: center;
            gap: 24px; padding: 16px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-num {
            font-size: 28px; font-weight: 900;
            display: block;
        }
        .stat-label {
            font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
        }

        footer {
            background: var(--black);
            padding: 20px;
            text-align: center;
            border-top: 3px solid var(--yellow);
        }
        .ft-logo {
            font-size: 24px; font-weight: 900;
            color: var(--yellow); font-style: italic;
        }
        .ft-logo span { color: var(--white); }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="btn-back">🔙</a>
        <div class="page-title">B Club Games</div>
        <div style="width: 40px;"></div>
    </header>

    <div class="hero">
        <span class="hero-emoji">🎮</span>
        <h1 class="hero-title">Pilih <span>Game!</span></h1>
        <p class="hero-sub">Belajar sambil bermain. Tap gambar untuk mulai!</p>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-num">2</span>
            <span class="stat-label">Game</span>
        </div>
        <div class="stat-item">
            <span class="stat-num">15</span>
            <span class="stat-label">Level</span>
        </div>
        <div class="stat-item">
            <span class="stat-num">∞</span>
            <span class="stat-label">Seru</span>
        </div>
    </div>

    <div class="games-grid">
        <a href="./detektif.html" class="game-card">
            <div class="game-icon">🕵️</div>
            <div class="game-info">
                <div class="game-name">Detektif Pola</div>
                <div class="game-desc">Cari pola yang hilang! Latih logika dan pengamatan.</div>
                <span class="game-badge">🧠 Logika</span>
            </div>
        </a>

        <a href="./masak.html" class="game-card">
            <div class="game-icon">👨‍🍳</div>
            <div class="game-info">
                <div class="game-name">Masak Bareng</div>
                <div class="game-desc">Urutkan langkah memasak! Latih sequencing.</div>
                <span class="game-badge">🎯 Urutan</span>
            </div>
        </a>
    </div>

    <footer>
        <div class="ft-logo">B<span>Club</span></div>
    </footer>

</body>
</html>
