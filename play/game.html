<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFE600">
    <title>B Club - Detektif Cilik</title>
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiQiBDbHViIC0gRGV0ZWt0aWYgQ2lsaWsiLCJzaG9ydF9uYW1lIjoiQiBDbHViIiwic3RhcnRfdXJsIjoiLi9pbmRleC5odG1sIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiI0Y1RjVGMCIsInRoZW1lX2NvbG9yIjoiI0ZGRTYwMCIsIm9yaWVudGF0aW9uIjoicG9ydHJhaXQifQ==">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        :root {
            --black: #0D0D0D; --yellow: #FFE600; --coral: #FF4D4D; 
            --white: #FFFFFF; --gray: #F5F5F0; --green: #00E676;
            --orange: #FF9800; --blue: #2196F3;
        }

        body {
            background: var(--gray); color: var(--black);
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; touch-action: manipulation;
        }

        header {
            background: var(--black); padding: 8px 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--yellow);
        }
        .btn-back {
            background: var(--white); border: 3px solid var(--black);
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; box-shadow: 3px 3px 0 var(--black);
            cursor: pointer; text-decoration: none;
        }
        .btn-back:active { transform: translate(3px, 3px); box-shadow: none; }
        .level-badge {
            background: var(--yellow); border: 3px solid var(--black);
            padding: 6px 16px; border-radius: 20px;
            font-weight: 900; font-size: 16px; box-shadow: 3px 3px 0 var(--black);
        }

        .score-board {
            display: flex; gap: 20px; justify-content: center;
            padding: 10px; background: var(--white);
            border-bottom: 3px solid var(--black);
        }
        .score-item {
            display: flex; align-items: center; gap: 6px;
            font-size: 24px; font-weight: 900;
        }
        .score-item .icon { font-size: 28px; }
        .score-item.stars { color: #FF9800; }
        .score-item.hearts { color: var(--coral); }
        .score-item.points { color: var(--green); }

        .mascot-area {
            display: flex; justify-content: center; align-items: center;
            padding: 12px; gap: 12px;
        }
        .mascot {
            font-size: 64px;
            animation: mascotBounce 2s infinite;
            filter: drop-shadow(3px 3px 0 var(--black));
        }
        @keyframes mascotBounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        .mascot-bubble {
            background: var(--white); border: 4px solid var(--black);
            padding: 12px 20px; border-radius: 20px;
            box-shadow: 4px 4px 0 var(--black);
            position: relative; font-size: 32px;
        }
        .mascot-bubble::after {
            content: ''; position: absolute; left: -16px; top: 50%;
            transform: translateY(-50%);
            border-width: 12px 16px 12px 0;
            border-style: solid;
            border-color: transparent var(--black) transparent transparent;
        }
        .mascot-bubble::before {
            content: ''; position: absolute; left: -10px; top: 50%;
            transform: translateY(-50%); z-index: 1;
            border-width: 10px 14px 10px 0;
            border-style: solid;
            border-color: transparent var(--white) transparent transparent;
        }

        .progress-area {
            display: flex; justify-content: center; gap: 8px;
            padding: 6px;
        }
        .progress-dot {
            width: 16px; height: 16px; border-radius: 50%;
            border: 3px solid var(--black); background: var(--white);
            transition: all 0.3s;
        }
        .progress-dot.done { background: var(--green); transform: scale(1.2); }
        .progress-dot.current {
            background: var(--yellow);
            animation: pulseDot 1s infinite;
            transform: scale(1.3);
        }
        @keyframes pulseDot {
            0%, 100% { box-shadow: 0 0 0 0 var(--yellow); }
            50% { box-shadow: 0 0 0 8px rgba(255, 230, 0, 0); }
        }

        .attempt-area {
            display: flex; justify-content: center; gap: 8px;
            min-height: 40px; align-items: center;
        }
        .heart {
            font-size: 32px; transition: all 0.3s;
        }
        .heart.broken {
            animation: heartBreak 0.5s;
            filter: grayscale(1) opacity(0.2);
        }
        @keyframes heartBreak {
            0% { transform: scale(1) rotate(0); }
            25% { transform: scale(1.3) rotate(-10deg); }
            50% { transform: scale(0.8) rotate(10deg); }
            100% { transform: scale(0.8) rotate(0); }
        }

        /* ═══════════════════════════════════════════════════════
           PATTERN ROW
        ═══════════════════════════════════════════════════════ */
        .pattern-row {
            display: flex; gap: 12px; margin: 12px 0;
            background: var(--white); padding: 16px; border-radius: 20px;
            border: 4px solid var(--black); box-shadow: 6px 6px 0 var(--black);
            flex-wrap: wrap; justify-content: center;
        }
        .pattern-item {
            width: 60px; height: 60px;
            display: flex; justify-content: center; align-items: center;
            font-size: 40px; background: var(--white);
            border-radius: 16px; border: 3px solid var(--black);
            box-shadow: 2px 2px 0 var(--black);
            transition: all 0.3s ease;
        }
        .pattern-item.missing {
            background: var(--yellow);
            border: 4px dashed var(--black);
            animation: pulseMissing 1.5s infinite;
            box-shadow: none;
        }
        .pattern-item.missing::before {
            content: '❓';
            font-size: 32px;
            animation: questionWiggle 1s infinite;
        }
        @keyframes pulseMissing {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes questionWiggle {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }
        .pattern-item.correct-fill {
            background: var(--green) !important;
            border: 3px solid var(--black) !important;
            animation: correctPop 0.5s;
            box-shadow: 2px 2px 0 var(--black);
        }
        @keyframes correctPop {
            0% { transform: scale(0.5); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* ═══════════════════════════════════════════════════════
           CHOICES AREA - Visual cue yang tidak misleading
        ═══════════════════════════════════════════════════════ */
        .choices-container {
            display: flex; flex-direction: column;
            align-items: center; gap: 12px;
        }
        
        /* Visual cue: Bouncing arrow ABOVE choices, not pointing at specific one */
        .choices-cue {
            font-size: 36px;
            animation: cueBounce 1s infinite;
            margin-bottom: 4px;
        }
        @keyframes cueBounce {
            0%, 100% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(-8px); opacity: 0.7; }
        }
        
        /* OR: Sparkle effect around choices area */
        .choices-sparkle {
            position: relative;
            padding: 8px 24px;
            border-radius: 20px;
            border: 3px dashed var(--blue);
            background: rgba(33, 150, 243, 0.1);
        }
        .choices-sparkle::before {
            content: '✨';
            position: absolute;
            top: -16px; left: -8px;
            font-size: 24px;
            animation: sparkle 1.5s infinite;
        }
        .choices-sparkle::after {
            content: '✨';
            position: absolute;
            bottom: -16px; right: -8px;
            font-size: 24px;
            animation: sparkle 1.5s infinite 0.7s;
        }
        @keyframes sparkle {
            0%, 100% { transform: scale(1) rotate(0); }
            50% { transform: scale(1.3) rotate(15deg); }
        }

        .choices-row {
            display: flex; gap: 16px; justify-content: center;
        }
        .choice-btn {
            width: 80px; height: 80px;
            display: flex; justify-content: center; align-items: center;
            font-size: 48px; background: var(--white);
            border: 4px solid var(--black); border-radius: 20px;
            box-shadow: 5px 5px 0 var(--black);
            cursor: pointer; transition: all 0.15s;
        }
        .choice-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 1px 1px 0 var(--black);
        }
        .choice-btn.correct {
            background: var(--green);
            animation: bigPop 0.4s;
            box-shadow: 5px 5px 0 #004d00;
        }
        .choice-btn.wrong {
            background: var(--coral);
            animation: bigShake 0.5s;
            box-shadow: 5px 5px 0 #800000;
        }
        .choice-btn.disabled {
            opacity: 0.4; pointer-events: none;
            transform: scale(0.9);
        }
        @keyframes bigPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }
        @keyframes bigShake {
            0%, 100% { transform: translateX(0) rotate(0); }
            20% { transform: translateX(-12px) rotate(-5deg); }
            40% { transform: translateX(12px) rotate(5deg); }
            60% { transform: translateX(-8px) rotate(-3deg); }
            80% { transform: translateX(8px) rotate(3deg); }
        }

        /* ═══════════════════════════════════════════════════════
           OVERLAYS
        ═══════════════════════════════════════════════════════ */
        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(13,13,13,0.92);
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; padding: 20px;
        }
        .overlay.show { display: flex; }

        .feedback-emoji {
            font-size: 80px;
            animation: celebrate 1s infinite;
            margin-bottom: 16px;
        }
        @keyframes celebrate {
            0%, 100% { transform: scale(1) rotate(-5deg); }
            50% { transform: scale(1.2) rotate(5deg); }
        }
        .feedback-stars { font-size: 48px; margin-bottom: 16px; }
        .feedback-btn {
            background: var(--yellow); color: var(--black);
            border: 4px solid var(--black); border-radius: 16px;
            padding: 16px 32px; font-size: 32px;
            font-weight: 900; box-shadow: 4px 4px 0 var(--white);
            cursor: pointer; margin-top: 16px;
        }
        .feedback-btn:active {
            transform: translate(4px, 4px); box-shadow: none;
        }

        .trophy {
            font-size: 100px;
            animation: trophyBounce 1s infinite;
            margin-bottom: 16px;
        }
        @keyframes trophyBounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        .star-rating { font-size: 64px; margin: 16px 0; }
        .stats-visual {
            display: flex; gap: 20px; margin: 16px 0;
        }
        .stat-circle {
            width: 80px; height: 80px; border-radius: 50%;
            border: 4px solid var(--yellow);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: var(--black);
        }
        .stat-circle .number { font-size: 32px; font-weight: 900; color: var(--yellow); }
        .stat-circle .label { font-size: 10px; color: #aaa; font-weight: 700; }

        @media (max-width: 360px) {
            .pattern-item { width: 50px; height: 50px; font-size: 32px; }
            .choice-btn { width: 70px; height: 70px; font-size: 40px; }
            .mascot { font-size: 48px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="./index.html" class="btn-back">🔙</a>
        <div class="level-badge" id="level-display">1️⃣</div>
    </header>

    <div class="score-board">
        <div class="score-item stars">
            <span class="icon">⭐</span><span id="stars-count">0</span>
        </div>
        <div class="score-item hearts">
            <span class="icon">❤️</span><span id="wrong-count">0</span>
        </div>
        <div class="score-item points">
            <span class="icon">💎</span><span id="total-score">0</span>
        </div>
    </div>

    <div class="game-container">
        <div class="mascot-area">
            <div class="mascot" id="mascot-emoji">🐝</div>
            <div class="mascot-bubble" id="mascot-bubble">🤔❓</div>
        </div>

        <div class="progress-area" id="progress-dots"></div>
        <div class="attempt-area" id="attempt-hearts">
            <span class="heart">❤️</span><span class="heart">❤️</span><span class="heart">❤️</span>
        </div>

        <div class="pattern-row" id="pattern-container"></div>

        <!-- CHOICES: Visual cue yang tidak misleading -->
        <div class="choices-container">
            <!-- Opsi 1: Bouncing arrow di atas area (tidak pointing spesifik) -->
            <div class="choices-cue" id="choices-cue">⬇️</div>
            
            <!-- Opsi 2: Sparkle border around choices (alternatif, bisa aktifkan via JS) -->
            <!-- <div class="choices-sparkle" id="choices-sparkle" style="display:none;"></div> -->
            
            <div class="choices-row" id="choices-container"></div>
        </div>
    </div>

    <div class="overlay" id="feedback-overlay">
        <div class="feedback-emoji" id="feedback-emoji">🎉</div>
        <div class="feedback-stars" id="feedback-stars"></div>
        <button class="feedback-btn" id="next-btn" onclick="nextQuestion()">▶️</button>
    </div>

    <div class="overlay" id="level-complete-overlay">
        <div class="trophy">🏆</div>
        <div class="star-rating" id="level-stars"></div>
        <div class="stats-visual">
            <div class="stat-circle"><div class="number" id="stat-first">0</div><div class="label">🥇1st</div></div>
            <div class="stat-circle"><div class="number" id="stat-second">0</div><div class="label">🥈2nd</div></div>
            <div class="stat-circle"><div class="number" id="stat-third">0</div><div class="label">🥉3rd</div></div>
        </div>
        <button class="feedback-btn" onclick="nextLevel()">▶️▶️</button>
        <button class="feedback-btn" onclick="restartLevel()" style="background: var(--white); margin-top: 8px;">🔄</button>
    </div>

    <div class="overlay" id="game-complete-overlay">
        <div class="trophy">👑</div>
        <div class="star-rating" id="final-stars"></div>
        <div class="stats-visual">
            <div class="stat-circle"><div class="number" id="final-total-stars">0</div><div class="label">⭐Total</div></div>
            <div class="stat-circle"><div class="number" id="final-total-score">0</div><div class="label">💎Score</div></div>
            <div class="stat-circle"><div class="number" id="final-accuracy">0%</div><div class="label">🎯Rate</div></div>
        </div>
        <button class="feedback-btn" onclick="restartGame()" style="margin-top: 16px;">🔄🎮</button>
    </div>

    <script>
        const CONFIG = {
            QUESTIONS_PER_LEVEL: 5,
            SCORE_FIRST: 100, SCORE_SECOND: 50, SCORE_THIRD: 25,
            MAX_ATTEMPTS: 3
        };

        const TEMPLATES = [
            {
                name: "1️⃣", type: "🍎🍌", choices: ["🍇", "🍌", "🍎"],
                mascot: { think: "🤔❓", happy: "😄👍", sad: "😢💔" },
                questions: [
                    { pattern: ["?", "🍌", "🍎", "🍌", "🍎", "🍌"], answer: "🍎" },
                    { pattern: ["🍎", "?", "🍎", "🍌", "🍎", "🍌"], answer: "🍌" },
                    { pattern: ["🍎", "🍌", "?", "🍌", "🍎", "🍌"], answer: "🍎" },
                    { pattern: ["🍎", "🍌", "🍎", "?", "🍎", "🍌"], answer: "🍌" },
                    { pattern: ["🍎", "🍌", "🍎", "🍌", "?", "🍌"], answer: "🍎" }
                ]
            },
            {
                name: "2️⃣", type: "⭐⭐🌙", choices: ["⭐", "🌙", "☀️"],
                mascot: { think: "🤔✨", happy: "🤩✨", sad: "😵‍💫" },
                questions: [
                    { pattern: ["?", "⭐", "🌙", "⭐", "⭐", "🌙"], answer: "⭐" },
                    { pattern: ["⭐", "?", "🌙", "⭐", "⭐", "🌙"], answer: "⭐" },
                    { pattern: ["⭐", "⭐", "?", "⭐", "⭐", "🌙"], answer: "🌙" },
                    { pattern: ["⭐", "⭐", "🌙", "?", "⭐", "🌙"], answer: "⭐" },
                    { pattern: ["⭐", "⭐", "🌙", "⭐", "?", "🌙"], answer: "⭐" }
                ]
            },
            {
                name: "3️⃣", type: "🐶🐱🐭", choices: ["🐶", "🐱", "🐭"],
                mascot: { think: "🤔🐾", happy: "🥳🎉", sad: "🙀" },
                questions: [
                    { pattern: ["?", "🐱", "🐭", "🐶", "🐱", "🐭"], answer: "🐶" },
                    { pattern: ["🐶", "?", "🐭", "🐶", "🐱", "🐭"], answer: "🐱" },
                    { pattern: ["🐶", "🐱", "?", "🐶", "🐱", "🐭"], answer: "🐭" },
                    { pattern: ["🐶", "🐱", "🐭", "?", "🐱", "🐭"], answer: "🐶" },
                    { pattern: ["🐶", "🐱", "🐭", "🐶", "?", "🐭"], answer: "🐱" }
                ]
            }
        ];

        let currentLevel = 0, currentQuestion = 0, currentAttempts = 0, isProcessing = false;
        let levelStats = { first: 0, second: 0, third: 0, score: 0 };
        let gameStats = { stars: 0, score: 0, questions: 0, correct: 0, attempts: 0 };
        let currentQuestions = [];

        function initLevel() {
            currentQuestion = 0; currentAttempts = 0; isProcessing = false;
            levelStats = { first: 0, second: 0, third: 0, score: 0 };
            const t = TEMPLATES[currentLevel];
            currentQuestions = [];
            for (let i = 0; i < CONFIG.QUESTIONS_PER_LEVEL; i++) {
                const q = t.questions[i];
                currentQuestions.push({
                    pattern: [...q.pattern], answer: q.answer,
                    choices: [...t.choices].sort(() => Math.random() - 0.5)
                });
            }
            renderProgressDots(); updateScoreBoard(); renderQuestion();
        }

        function renderProgressDots() {
            const c = document.getElementById('progress-dots');
            c.innerHTML = '';
            for (let i = 0; i < CONFIG.QUESTIONS_PER_LEVEL; i++) {
                const d = document.createElement('div');
                d.className = 'progress-dot';
                if (i < currentQuestion) d.classList.add('done');
                else if (i === currentQuestion) d.classList.add('current');
                c.appendChild(d);
            }
        }

        function renderHearts() {
            document.querySelectorAll('.heart').forEach((h, i) => {
                h.className = 'heart' + (i < currentAttempts ? ' broken' : '');
            });
        }

        function resetHearts() {
            document.querySelectorAll('.heart').forEach(h => h.className = 'heart');
        }

        function renderQuestion() {
            const t = TEMPLATES[currentLevel];
            const q = currentQuestions[currentQuestion];
            document.getElementById('level-display').innerText = t.name;
            document.getElementById('mascot-emoji').innerText = t.mascot.think.split('')[0];
            document.getElementById('mascot-bubble').innerText = t.mascot.think;
            resetHearts(); renderProgressDots();

            const pc = document.getElementById('pattern-container');
            pc.innerHTML = '';
            q.pattern.forEach(item => {
                const d = document.createElement('div');
                if (item === "?") {
                    d.className = 'pattern-item missing'; d.id = 'missing-slot';
                } else {
                    d.className = 'pattern-item'; d.innerText = item;
                }
                pc.appendChild(d);
            });

            const cc = document.getElementById('choices-container');
            cc.innerHTML = '';
            q.choices.forEach(choice => {
                const b = document.createElement('div');
                b.className = 'choice-btn'; b.innerText = choice;
                b.onclick = () => checkAnswer(choice, b);
                cc.appendChild(b);
            });
        }

        function checkAnswer(choice, btn) {
            if (isProcessing) return;
            const q = currentQuestions[currentQuestion];
            const t = TEMPLATES[currentLevel];
            currentAttempts++; renderHearts();

            if (choice === q.answer) {
                isProcessing = true; btn.classList.add('correct');
                let points = 0, type = '';
                if (currentAttempts === 1) {
                    points = CONFIG.SCORE_FIRST; levelStats.first++; type = 'first';
                    gameStats.correct++; document.getElementById('mascot-bubble').innerText = t.mascot.happy;
                } else if (currentAttempts === 2) {
                    points = CONFIG.SCORE_SECOND; levelStats.second++; type = 'second';
                    document.getElementById('mascot-bubble').innerText = t.mascot.happy;
                } else {
                    points = CONFIG.SCORE_THIRD; levelStats.third++; type = 'third';
                    document.getElementById('mascot-bubble').innerText = '😅👍';
                }
                levelStats.score += points; gameStats.score += points;
                gameStats.questions++; gameStats.attempts += currentAttempts;
                updateScoreBoard();
                const s = document.getElementById('missing-slot');
                if (s) { s.innerText = q.answer; s.classList.remove('missing'); s.classList.add('correct-fill'); }
                setTimeout(() => showFeedback(true, type, points), 600);
            } else {
                btn.classList.add('wrong'); btn.classList.add('disabled');
                if (currentAttempts >= CONFIG.MAX_ATTEMPTS) {
                    isProcessing = true; levelStats.third++;
                    gameStats.questions++; gameStats.attempts += currentAttempts;
                    document.getElementById('mascot-bubble').innerText = t.mascot.sad;
                    const s = document.getElementById('missing-slot');
                    if (s) { s.innerText = q.answer; s.classList.remove('missing'); s.style.background = 'var(--orange)'; s.style.border = '3px solid var(--black)'; }
                    updateScoreBoard();
                    setTimeout(() => showFeedback(false, 'failed', 0), 800);
                } else {
                    setTimeout(() => btn.classList.remove('wrong'), 400);
                }
            }
        }

        function showFeedback(isCorrect, type, points) {
            const o = document.getElementById('feedback-overlay');
            const e = document.getElementById('feedback-emoji');
            const s = document.getElementById('feedback-stars');
            const b = document.getElementById('next-btn');
            if (isCorrect) {
                if (type === 'first') { e.innerText = '🤩'; s.innerText = '⭐⭐⭐'; }
                else if (type === 'second') { e.innerText = '😄'; s.innerText = '⭐⭐'; }
                else { e.innerText = '👍'; s.innerText = '⭐'; }
                b.innerText = currentQuestion < CONFIG.QUESTIONS_PER_LEVEL - 1 ? '▶️' : '📊';
            } else {
                e.innerText = '💡'; s.innerText = currentQuestions[currentQuestion].answer;
                b.innerText = '▶️';
            }
            o.classList.add('show');
        }

        function nextQuestion() {
            document.getElementById('feedback-overlay').classList.remove('show');
            isProcessing = false; currentAttempts = 0;
            if (currentQuestion < CONFIG.QUESTIONS_PER_LEVEL - 1) {
                currentQuestion++; renderQuestion();
            } else { showLevelComplete(); }
        }

        function showLevelComplete() {
            const o = document.getElementById('level-complete-overlay');
            let stars = '';
            if (levelStats.first >= 4) { stars = '⭐⭐⭐'; gameStats.stars += 3; }
            else if (levelStats.first >= 2) { stars = '⭐⭐'; gameStats.stars += 2; }
            else { stars = '⭐'; gameStats.stars += 1; }
            document.getElementById('level-stars').innerText = stars;
            document.getElementById('stat-first').innerText = levelStats.first;
            document.getElementById('stat-second').innerText = levelStats.second;
            document.getElementById('stat-third').innerText = levelStats.third;
            updateScoreBoard(); o.classList.add('show');
        }

        function nextLevel() {
            document.getElementById('level-complete-overlay').classList.remove('show');
            if (currentLevel < TEMPLATES.length - 1) { currentLevel++; initLevel(); }
            else { showGameComplete(); }
        }

        function restartLevel() {
            document.getElementById('level-complete-overlay').classList.remove('show');
            gameStats.stars -= document.getElementById('level-stars').innerText.length;
            initLevel();
        }

        function showGameComplete() {
            const o = document.getElementById('game-complete-overlay');
            const maxStars = TEMPLATES.length * 3;
            const rating = Math.max(1, Math.round((gameStats.stars / maxStars) * 3));
            let fs = ''; for (let i = 0; i < rating; i++) fs += '⭐';
            document.getElementById('final-stars').innerText = fs;
            document.getElementById('final-total-stars').innerText = gameStats.stars;
            document.getElementById('final-total-score').innerText = gameStats.score;
            const acc = gameStats.questions > 0 ? Math.round((gameStats.correct / gameStats.questions) * 100) : 0;
            document.getElementById('final-accuracy').innerText = acc + '%';
            o.classList.add('show');
        }

        function restartGame() {
            document.getElementById('game-complete-overlay').classList.remove('show');
            currentLevel = 0;
            gameStats = { stars: 0, score: 0, questions: 0, correct: 0, attempts: 0 };
            initLevel();
        }

        function updateScoreBoard() {
            document.getElementById('stars-count').innerText = gameStats.stars;
            document.getElementById('wrong-count').innerText = gameStats.attempts - gameStats.correct;
            document.getElementById('total-score').innerText = gameStats.score;
        }

        initLevel();
    </script>
</body>
</html>
