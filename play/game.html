<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFE600">
    <title>Detektif Pola - B Club</title>
    <link rel="manifest" href="./manifest.json">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        :root {
            --black: #0D0D0D; --yellow: #FFE600; --coral: #FF4D4D; 
            --white: #FFFFFF; --gray: #F5F5F0; --green: #00E676;
        }

        body {
            background: var(--gray); color: var(--black);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        header {
            background: var(--black); padding: 12px 16px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--yellow);
        }
        .btn-back {
            background: var(--white); color: var(--black); border: 2px solid var(--black);
            padding: 8px 12px; border-radius: 8px; font-weight: 800; font-size: 14px;
            text-decoration: none; box-shadow: 2px 2px 0 var(--black);
            cursor: pointer;
        }
        .btn-back:active { transform: translate(2px, 2px); box-shadow: none; }
        .level-indicator {
            background: var(--yellow); color: var(--black);
            padding: 8px 16px; border-radius: 20px; font-weight: 900; font-size: 14px;
            border: 2px solid var(--black);
        }

        .game-container {
            flex: 1; display: flex; flex-direction: column;
            padding: 20px; justify-content: center; align-items: center;
        }
        .mascot-speech {
            background: var(--white); border: 3px solid var(--black);
            padding: 16px; border-radius: 16px; margin-bottom: 24px;
            text-align: center; font-weight: 800; font-size: 16px;
            box-shadow: 4px 4px 0 var(--black); position: relative;
            max-width: 300px;
        }
        .mascot-speech::after {
            content: ''; position: absolute; bottom: -12px; left: 50%;
            transform: translateX(-50%); border-width: 12px 12px 0;
            border-style: solid; border-color: var(--black) transparent transparent transparent;
        }

        .pattern-row {
            display: flex; gap: 8px; margin-bottom: 40px;
            background: var(--white); padding: 12px; border-radius: 16px;
            border: 3px solid var(--black); box-shadow: 4px 4px 0 var(--black);
            flex-wrap: wrap;
            justify-content: center;
        }
        .pattern-item {
            width: 50px; height: 50px; display: flex; justify-content: center; align-items: center;
            font-size: 32px; background: var(--white); border-radius: 12px;
            border: 2px solid var(--black);
        }
        .pattern-item.missing {
            background: var(--yellow); 
            border: 3px dashed var(--black);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 230, 0, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 230, 0, 0); }
        }

        .choices-row {
            display: flex; gap: 12px; justify-content: center;
        }
        .choice-btn {
            width: 65px; height: 65px; display: flex; justify-content: center; align-items: center;
            font-size: 36px; background: var(--white); border: 3px solid var(--black);
            border-radius: 16px; box-shadow: 4px 4px 0 var(--black);
            cursor: pointer; transition: all 0.1s;
        }
        .choice-btn:active {
            transform: translate(2px, 2px); 
            box-shadow: 2px 2px 0 var(--black);
        }
        .choice-btn.correct { 
            background: var(--green); 
            animation: pop 0.3s;
        }
        .choice-btn.wrong { 
            background: var(--coral); 
            animation: shake 0.4s;
        }

        @keyframes pop { 50% { transform: scale(1.2); } }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(13,13,13,0.95); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; color: var(--white); text-align: center; padding: 20px;
        }
        .overlay.show { display: flex; }
        .overlay h2 { font-size: 32px; font-weight: 900; font-style: italic; color: var(--yellow); margin-bottom: 16px; }
        .overlay p { font-size: 18px; margin-bottom: 32px; line-height: 1.5; }
        .overlay button {
            background: var(--yellow); color: var(--black); border: none;
            padding: 16px 32px; border-radius: 12px; font-weight: 900; font-size: 18px;
            box-shadow: 4px 4px 0 var(--white); cursor: pointer;
        }
        .overlay button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--white); }

        @media (max-width: 360px) {
            .pattern-item { width: 45px; height: 45px; font-size: 28px; }
            .choice-btn { width: 60px; height: 60px; font-size: 32px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="./index.html" class="btn-back">← Kembali</a>
        <div class="level-indicator" id="level-display">Level 1</div>
    </header>

    <div class="game-container">
        <div class="mascot-speech" id="mascot-text">
            🐝 "Halo Detektif! Apa yang hilang dari pola ini?"
        </div>

        <div class="pattern-row" id="pattern-container"></div>
        <div class="choices-row" id="choices-container"></div>
    </div>

    <div class="overlay" id="feedback-overlay">
        <h2 id="feedback-title">HEBAT!</h2>
        <p id="feedback-text">Kamu menemukan polanya!</p>
        <button id="next-btn" onclick="nextQuestion()">Lanjut! 🚀</button>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════
        //  DATA LEVEL - SEMUA SLOT BERISI EMOJI ATAU "?"
        //  TIDAK ADA STRING KOSONG "" DI MANAPUN
        // ═══════════════════════════════════════════════════════
        
        const levels = [
            {
                name: "Level 1",
                pattern: ["🍎", "🍌", "🍎", "🍌", "", "?"],
                answer: "🍌",
                choices: ["🍎", "", "🍇"]
            },
            {
                name: "Level 2",
                pattern: ["⭐", "⭐", "", "⭐", "⭐", "?"],
                answer: "🌙",
                choices: ["⭐", "🌙", "☀️"]
            },
            {
                name: "Level 3",
                pattern: ["🐶", "🐱", "🐭", "🐶", "🐱", "?"],
                answer: "🐭",
                choices: ["🐶", "🐱", "🐭"]
            }
        ];

        let currentLevel = 0;
        let isProcessing = false;

        function renderLevel() {
            const level = levels[currentLevel];
            document.getElementById('level-display').innerText = level.name;
            document.getElementById('mascot-text').innerText = ` "Level ${currentLevel + 1}! Apa yang hilang?"`;

            // DEBUG: Cek apakah ada string kosong
            console.log('Pattern:', level.pattern);
            console.log('Choices:', level.choices);

            // Render Pattern - VALIDASI: skip jika string kosong
            const patternContainer = document.getElementById('pattern-container');
            patternContainer.innerHTML = '';
            level.pattern.forEach((item) => {
                // SKIP jika string kosong (safety check)
                if (item === "" || item === null || item === undefined) {
                    console.warn('⚠️ Ditemukan string kosong di pattern! Skip item ini.');
                    return;
                }
                
                const div = document.createElement('div');
                if (item === "?") {
                    div.className = 'pattern-item missing';
                    div.innerText = '';
                } else {
                    div.className = 'pattern-item';
                    div.innerText = item;
                }
                patternContainer.appendChild(div);
            });

            // Render Choices - VALIDASI: skip jika string kosong
            const choicesContainer = document.getElementById('choices-container');
            choicesContainer.innerHTML = '';
            const shuffledChoices = [...level.choices].sort(() => Math.random() - 0.5);
            
            shuffledChoices.forEach(choice => {
                // SKIP jika string kosong (safety check)
                if (choice === "" || choice === null || choice === undefined) {
                    console.warn('⚠️ Ditemukan string kosong di choices! Skip item ini.');
                    return;
                }
                
                const btn = document.createElement('div');
                btn.className = 'choice-btn';
                btn.innerText = choice;
                btn.onclick = () => checkAnswer(choice, btn);
                choicesContainer.appendChild(btn);
            });
        }

        function checkAnswer(choice, btnElement) {
            if (isProcessing) return;
            isProcessing = true;

            const level = levels[currentLevel];

            if (choice === level.answer) {
                btnElement.classList.add('correct');
                
                const missingSlot = document.querySelector('.pattern-item.missing');
                if (missingSlot) {
                    missingSlot.innerText = choice;
                    missingSlot.classList.remove('missing');
                    missingSlot.style.background = 'var(--green)';
                    missingSlot.style.border = '3px solid var(--black)';
                }
                
                setTimeout(() => showFeedback(true), 500);
            } else {
                btnElement.classList.add('wrong');
                setTimeout(() => {
                    btnElement.classList.remove('wrong');
                    isProcessing = false;
                }, 400);
            }
        }

        function showFeedback(isCorrect) {
            const overlay = document.getElementById('feedback-overlay');
            const title = document.getElementById('feedback-title');
            const text = document.getElementById('feedback-text');
            const btn = document.getElementById('next-btn');

            if (isCorrect) {
                title.innerText = "HEBAT! 🌟";
                text.innerText = "Kamu Detektif Pola yang hebat!";
                btn.innerText = currentLevel < levels.length - 1 ? "Level Berikutnya! 🚀" : "Selesai! 🏆";
                btn.onclick = nextQuestion;
            }
            overlay.classList.add('show');
        }

        function nextQuestion() {
            document.getElementById('feedback-overlay').classList.remove('show');
            isProcessing = false;

            if (currentLevel < levels.length - 1) {
                currentLevel++;
                renderLevel();
            } else {
                alert("🎉 SELAMAT! Kamu telah menyelesaikan semua level Detektif Pola!\n\nKamu mendapat 3 bintang! ⭐⭐⭐");
                currentLevel = 0;
                renderLevel();
            }
        }

        renderLevel();
    </script>
</body>
</html>
